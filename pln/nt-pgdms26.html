<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Redirecionando...</title>
    <link rel="stylesheet" href="../css/design-token.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/redirect-style.css">
    <link rel="stylesheet" href="../css/responsive.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <script src="../js/button-share.js" defer></script>
    <script src="../js/theme.js" defer></script>
    <script src="../js/layout.js" defer></script>
    <!-- <script src="../js/redirect.js" defer></script> -->
    <script src="../js/redirect-page-meses.js" defer></script>
    <script src="../components/footer-without-theme.js" defer></script>

</head>

<body data-redirect="https://www.youtube.com">

    <div class="card">

        <header>
            <nav class="nav">
                <a href="../index.html" rel="noopener noreferrer" translate="no">Path</a>

                <button class="link-button" id="shareBtn">
                    <span class="material-symbols-outlined icon-light">share</span>
                </button>
            </nav>
        </header>

        <div class="wrapper">
            <div class="folder">
                <span class="folder-top"></span>
                <span class="paper"></span>
                <span class="folder-bg">
          <img src="../images/folder.svg" class="photo-profil" alt="">
        </span>
            </div>
        </div>

        <div class="loader-wrapper">
            <div class="loader-line"></div>
        </div>

        <p id="message"></p>

        <div id="destination"></div>

        <div class="actions">
            <button id="cancelBtn">Cancelar</button>
            <button id="goBtn">Avançar</button>
        </div>

        <div id="footer"></div>


    </div>

</body>

</html>
